services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theft-detection-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist database
      - ./theft_detection.db:/app/theft_detection.db
      # Persist alerts
      - ./alerts:/app/alerts
      # Persist face data
      - ./faces:/app/faces
      # Configuration files (optional, can be mounted or baked into image)
      - ./cameras.json:/app/cameras.json
      - ./settings.json:/app/settings.json
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - theft-detection-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/settings')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Dashboard (Next.js) - Uncomment to run the dashboard in a container
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: theft-detection-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - theft-detection-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  theft-detection-network:
    driver: bridge
